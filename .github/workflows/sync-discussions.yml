name: Sync Discussions

on:
  push:
    branches: [main]
    paths:
      - '.github/DISCUSSIONS/**'
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  issues: write

jobs:
  sync-discussions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync discussions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          
          echo "📝 开始同步 Discussions..."
          echo "   仓库：$REPO"
          
          # 获取所有 Discussion 文件
          files=$(find .github/DISCUSSIONS -name "*.md" -type f 2>/dev/null || echo "")
          
          if [ -z "$files" ]; then
            echo "ℹ️ 未找到 Discussion 文件"
            exit 0
          fi
          
          for file in $files; do
            echo ""
            echo "🔖 处理文件：$file"
            
            # 读取文件内容
            content=$(cat "$file")
            
            # 提取标题（第一行去掉 #）
            title=$(echo "$content" | head -1 | sed 's/^# //')
            echo "   标题：$title"
            
            # 提取正文（去掉第一行标题）
            body=$(echo "$content" | tail -n +2)
            
            # 获取仓库信息
            repo_info=$(gh api graphql \
              -f query='query($owner: String!, $name: String!) { 
                repository(owner: $owner, name: $name) { 
                  id 
                  discussionCategories(first: 1) { nodes { id name } } 
                } 
              }' \
              -F owner="${{ github.repository_owner }}" \
              -F name="${{ github.event.repository.name }}" \
              --jq '.data.repository')
            
            repo_id=$(echo "$repo_info" | jq -r '.id')
            category_id=$(echo "$repo_info" | jq -r '.discussionCategories.nodes[0].id')
            
            echo "   仓库 ID: $repo_id"
            echo "   分类 ID: $category_id"
            
            # 搜索现有讨论
            echo "   搜索现有讨论..."
            existing=$(gh api graphql \
              -f query='query($owner: String!, $repo: String!, $title: String!) { 
                repository(owner: $owner, name: $repo) { 
                  discussions(first: 50, query: $title) { 
                    nodes { id title } 
                  } 
                } 
              }' \
              -F owner="${{ github.repository_owner }}" \
              -F repo="${{ github.event.repository.name }}" \
              -F title="$title" \
              --jq '.data.repository.discussions.nodes[] | select(.title == $title) | .id' || echo "")
            
            if [ -n "$existing" ]; then
              echo "   ✅ 找到现有讨论，更新中..."
              # 更新讨论（简化版，只更新 body）
              gh api graphql \
                -f query='mutation($input: UpdateDiscussionInput!) { 
                  updateDiscussion(input: $input) { 
                    discussion { url } 
                  } 
                }' \
                -F input.discussionId="$existing" \
                -F input.body="$body" \
                --jq '.data.updateDiscussion.discussion.url' || echo "更新失败"
              echo "   📍 更新完成"
            else
              echo "   ✨ 创建新讨论..."
              # 创建讨论
              result=$(gh api graphql \
                -f query='mutation($input: CreateDiscussionInput!) { 
                  createDiscussion(input: $input) { 
                    discussion { url } 
                  } 
                }' \
                -F input.repositoryId="$repo_id" \
                -F input.categoryId="$category_id" \
                -F input.title="$title" \
                -F input.body="$body" \
                --jq '.data.createDiscussion.discussion.url' || echo "")
              
              if [ -n "$result" ]; then
                echo "   🎉 创建成功！URL: $result"
              else
                echo "   ❌ 创建失败，请检查权限设置"
              fi
            fi
          done
          
          echo ""
          echo "✅ Discussion 同步完成！"
